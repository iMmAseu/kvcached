<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>kvcached Docs</title>
  <style>
:root {
  --bg: #f5f7fb;
  --surface: #ffffff;
  --surface-muted: #f9fbff;
  --text: #1f2937;
  --text-soft: #4b5563;
  --border: #d7deea;
  --accent: #0f4c81;
  --accent-soft: #e9f2fb;
  --code-bg: #f3f6fa;
  --shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
  --font-sans: "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
    "Noto Sans", Arial, sans-serif;
  --font-mono: "Cascadia Code", Consolas, "SFMono-Regular", Menlo, Monaco, monospace;
  --radius: 18px;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background: linear-gradient(180deg, #f7f9fc 0%, #f3f6fb 100%);
  color: var(--text);
  font-family: var(--font-sans);
  line-height: 1.78;
}

a {
  color: var(--accent);
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

.page {
  max-width: 1040px;
  margin: 0 auto;
  padding: 32px 20px 64px;
}

.hero,
.toc,
.content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.hero {
  padding: 30px 34px 26px;
  margin-bottom: 22px;
}

.eyebrow {
  margin: 0 0 10px;
  color: var(--accent);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.hero h1 {
  margin: 0;
  font-size: clamp(30px, 4vw, 42px);
  line-height: 1.2;
  letter-spacing: -0.02em;
}

.subtitle {
  margin: 16px 0 0;
  color: var(--text-soft);
  font-size: 16px;
}

.hero-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 12px 16px;
  margin-top: 20px;
  color: var(--text-soft);
  font-size: 14px;
}

.meta-pill {
  display: inline-flex;
  align-items: center;
  padding: 7px 12px;
  border-radius: 999px;
  background: var(--accent-soft);
  border: 1px solid #cfe1f2;
}

.toc {
  padding: 22px 28px;
  margin-bottom: 22px;
}

.toc h2 {
  margin: 0 0 12px;
  font-size: 20px;
}

.toc ul {
  margin: 0;
  padding-left: 20px;
}

.toc li {
  margin: 8px 0;
}

.content {
  padding: 28px 34px 38px;
}

.content h2,
.content h3,
.content h4,
.content h5,
.content h6 {
  scroll-margin-top: 24px;
  line-height: 1.35;
  letter-spacing: -0.01em;
}

.content h2 {
  margin: 34px 0 14px;
  padding-top: 8px;
  font-size: 28px;
}

.content h3 {
  margin: 28px 0 12px;
  font-size: 22px;
}

.content h4 {
  margin: 24px 0 10px;
  font-size: 18px;
}

.content p {
  margin: 14px 0;
}

.content ul,
.content ol {
  margin: 14px 0 18px;
  padding-left: 24px;
}

.content li {
  margin: 8px 0;
}

.content code {
  padding: 0.15em 0.4em;
  border-radius: 8px;
  background: var(--code-bg);
  font-family: var(--font-mono);
  font-size: 0.94em;
}

.content pre {
  margin: 18px 0;
  padding: 18px 18px;
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: #f6f8fb;
}

.content pre code {
  display: block;
  padding: 0;
  background: transparent;
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.65;
}

.table-wrap {
  margin: 18px 0 22px;
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: 14px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: var(--surface);
}

thead {
  background: var(--surface-muted);
}

th,
td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  text-align: left;
  vertical-align: top;
  word-break: break-word;
  font-variant-numeric: tabular-nums;
}

tbody tr:last-child td {
  border-bottom: none;
}

.footer {
  margin-top: 18px;
  color: var(--text-soft);
  font-size: 13px;
  text-align: center;
}

.landing {
  max-width: 860px;
  margin: 0 auto;
  padding: 40px 20px 64px;
}

.landing-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 34px;
}

.landing-card h1 {
  margin: 0 0 12px;
  font-size: clamp(28px, 4vw, 40px);
  line-height: 1.2;
}

.landing-card p {
  margin: 0 0 22px;
  color: var(--text-soft);
}

.landing-links {
  display: grid;
  gap: 12px;
}

.landing-link {
  display: block;
  padding: 16px 18px;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: var(--surface-muted);
  color: var(--text);
  font-weight: 600;
}

.landing-link small {
  display: block;
  margin-top: 6px;
  color: var(--text-soft);
  font-weight: 400;
}

@media (max-width: 720px) {
  .page {
    padding: 18px 12px 36px;
  }

  .hero,
  .toc,
  .content {
    padding-left: 18px;
    padding-right: 18px;
  }

  .content {
    padding-top: 22px;
    padding-bottom: 28px;
  }

  .content h2 {
    font-size: 24px;
  }
}
</style>
</head>
<body>
  <div class="landing">
    <div class="landing-card">
      <p class="eyebrow">kvcached Docs</p>
      <h1>vLLM Async Scheduling + MP</h1>
      <p>Static HTML documents for direct GitHub Pages hosting.</p>
      <div class="landing-links">
        <a class="landing-link" href="vllm_async_mp_investigation.html">
          中文文档
          <small>Investigation, fix rationale, and benchmark notes.</small>
        </a>
        <a class="landing-link" href="vllm_async_mp_investigation_en.html">
          English Version
          <small>Technical blog style English write-up.</small>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
